name: Weather ELT Pipeline

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

# Definir variables a nivel de JOB para que todos los steps las vean
env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_DATASET: ${{ secrets.GCP_DATASET }}
  GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json

jobs:
  weather-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r ingestion/requirements.txt
        pip install dbt-bigquery  # Aseguramos que dbt esté instalado

    - name: Crear archivo de credenciales GCP
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > gcp-key.json
        chmod 600 gcp-key.json

    - name: Ejecutar Extracción
      run: python ingestion/extraction.py

    - name: dbt Debug & Deps
      run: |
        dbt debug --profiles-dir dbt_project --project-dir dbt_project
        dbt deps --profiles-dir dbt_project --project-dir dbt_project

    - name: dbt Run (Transformaciones)
      run: dbt run --profiles-dir dbt_project --project-dir dbt_project

    - name: Limpiar credenciales
      if: always()
      run: rm -f gcp-key.json

    - name: Notificar éxito
      if: success()
      run: echo "✅ Pipeline ejecutado exitosamente a las $(date -u +'%Y-%m-%d %H:%M:%S') UTC"

    - name: Notificar error
      if: failure()
      run: |
        echo "❌ Pipeline falló"
        exit 1